<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }
  .card {
    width: 920px;
    padding: 90px 80px;
    background: linear-gradient(160deg, #141414 0%, #0f0f0f 100%);
    border: 1px solid #242424;
    border-radius: 28px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, #ffffff06, transparent 70%);
    border-radius: 50%;
  }
  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 180px;
    color: #1e1e1e;
    position: absolute;
    top: 10px; left: 55px;
    line-height: 1;
  }
  .tweet-text {
    font-family: 'Playfair Display', serif;
    color: #efefef;
    line-height: 1.6;
    font-weight: 400;
    position: relative;
    z-index: 1;
    margin-top: 80px;
    margin-bottom: 70px;
    letter-spacing: -0.2px;
    word-break: break-word;
  }
  .divider {
    width: 48px;
    height: 2px;
    background: #333;
    margin-bottom: 40px;
  }
  .author-name {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .author-handle {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    color: #444;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="quote-mark">&#8220;</div>
  <div class="tweet-text" id="text"></div>
  <div class="divider"></div>
  <div class="author-name">David Keyes</div>
  <div class="author-handle">@DavidMKeyes</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const text = params.get('text') || '';
  const len = text.length;
  const fontSize = len < 100 ? 56 : len < 200 ? 46 : len < 300 ? 38 : 32;

  const el = document.getElementById('text');
  el.style.fontSize = fontSize + 'px';
  el.innerHTML = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
</script>
</body>
</html>
