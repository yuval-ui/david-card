<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #000000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #ffffff;
    padding: 90px 72px;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 64px;
  }

  .profile {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .pfp {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .name {
    font-size: 34px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.3px;
  }

  .checkmark {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
  }

  .handle {
    font-size: 28px;
    color: #71767b;
    margin-top: 6px;
    font-weight: 400;
  }

  .x-logo {
    font-size: 52px;
    font-weight: 700;
    color: #ffffff;
    font-family: "Times New Roman", Times, serif;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .tweet-text {
    color: #ffffff;
    line-height: 1.45;
    font-weight: 400;
    word-break: break-word;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="profile">
      <img class="pfp" id="pfp" src="pfp.jpg" onerror="this.style.display='none'" />
      <div>
        <div class="name-row">
          <span class="name">David Keyes</span>
          <img class="checkmark" src="checkmark.png" />
        </div>
        <div class="handle">@DavidMKeyes</div>
      </div>
    </div>
    <div class="x-logo">𝕏.com</div>
  </div>

  <div class="tweet-text" id="text"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('text') || '';
  const len = raw.length;
  const fontSize = len < 80 ? 56 : len < 160 ? 48 : len < 260 ? 40 : len < 360 ? 34 : 28;

  const el = document.getElementById('text');
  el.style.fontSize = fontSize + 'px';
  el.textContent = raw;
</script>

</body>
</html>
